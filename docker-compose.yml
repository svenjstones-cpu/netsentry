version: '3.8'

services:
  netsentry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netsentry
    restart: unless-stopped
    ports:
      # Map host port 53 (UDP) for incoming local DNS requests
      - "53:53/udp"
      # Map host port 8080 (TCP) for the dashboard web administration console
      - "8080:8080/tcp"
    volumes:
      # Persist SQLite database and logs in the local ./data directory
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DNS_PORT=53
      - API_PORT=8080
      - UPSTREAM_DNS=1.1.1.1 # Default upstream DNS resolver (Cloudflare)
      - DB_DIR=/app/data
      - FRONTEND_PATH=/app/backend/public
